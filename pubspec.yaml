name: paejae_pick_2_app
description: "Paejae Pick 2.0 Flutter smart campus app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  intl: ^0.20.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  mobile_scanner: ^7.2.0
  pedometer: ^4.2.0
  permission_handler: ^12.0.1
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
